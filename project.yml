name: HabitBloom
options:
  minimumXcodeGenVersion: 2.42.0
  xcodeVersion: "17.0"
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ZNSTKHPLY3
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    HABITBLOOM_REMOTE_BASE_URL: ""
    HABITBLOOM_REMOTE_DEVICE_KEY: ""
    HABITBLOOM_REMOTE_WRITE_TOKEN: ""
packages: {}
schemes:
  HabitBloom:
    build:
      targets:
        HabitBloom: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  HabitBloom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabitBloomApp
      - path: Sources/HabitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zjx.HabitBloom
        INFOPLIST_FILE: HabitBloomApp/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: HabitBloomApp/Support/HabitBloom.entitlements
        TARGETED_DEVICE_FAMILY: "1,6"
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
    dependencies:
      - target: HabitBloomWidgets
        platformFilter: iOS
      - target: HabitBloomWidgetsMac
        platformFilter: macOS
  HabitBloomWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabitBloomWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zjx.HabitBloom.widgets
        INFOPLIST_FILE: HabitBloomWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: HabitBloomWidgets/HabitBloomWidgets.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  HabitBloomWidgetsMac:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HabitBloomWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zjx.HabitBloom.widgets
        INFOPLIST_FILE: HabitBloomWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: HabitBloomWidgets/HabitBloomWidgets.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
